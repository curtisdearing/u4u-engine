name: Annotator data issue
description: A variant is getting wrong or missing data from ClinVar, gnomAD, VEP, or MyVariant
labels: [annotator]

body:
  - type: input
    id: variant
    attributes:
      label: Variant
      placeholder: "rs113488022  or  7:140453136:A:T"
    validations:
      required: true

  - type: dropdown
    id: source
    attributes:
      label: Which source
      options:
        - ClinVar
        - gnomAD
        - Ensembl VEP
        - MyVariant
        - Not sure
    validations:
      required: true

  - type: textarea
    id: wrong
    attributes:
      label: What's wrong
      placeholder: |
        Engine returns: clinvar = null
        ClinVar shows: Pathogenic (https://www.ncbi.nlm.nih.gov/clinvar/variation/12375/)
    validations:
      required: true
